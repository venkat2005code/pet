<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Mobile Dog Training & Behavior Consultation</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
  <link rel="stylesheet" href="css/animations.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
      background: var(--color-bg);
      border-radius: 12px;
      padding: 50px 40px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    .login-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 40px;
      justify-content: center;
    }

    .login-form {
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--color-text);
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      color: var(--color-text);
      background: var(--color-bg-alt);
      transition: all 0.3s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--color-primary);
      background: var(--color-bg);
    }

    .remember-forgot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .remember-forgot a {
      color: var(--color-primary);
      text-decoration: none;
      transition: opacity 0.3s ease;
    }

    .remember-forgot a:hover {
      opacity: 0.8;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }

    .login-btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }

    .divider {
      display: flex;
      align-items: center;
      margin: 30px 0;
      font-size: 14px;
      color: var(--color-muted);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    .divider span {
      margin: 0 12px;
    }

    .social-login {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 30px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--color-border);
      background: var(--color-bg-alt);
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      color: var(--color-text);
      transition: all 0.3s ease;
      text-decoration: none;
    }

    .social-btn:hover {
      background: var(--color-border);
      transform: translateY(-2px);
    }

    .social-btn i {
      font-size: 18px;
    }

    .signup-link {
      text-align: center;
      font-size: 14px;
      color: var(--color-text);
    }

    .signup-link a {
      color: var(--color-primary);
      text-decoration: none;
      font-weight: 600;
      transition: opacity 0.3s ease;
    }

    .signup-link a:hover {
      opacity: 0.8;
    }

    .login-toggles {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 100;
    }

    .toggle-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 1px solid var(--color-border);
      background: var(--color-bg-alt);
      color: var(--color-text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    .toggle-btn:hover {
      background: var(--color-primary);
      color: #fff;
      border-color: var(--color-primary);
    }

    .toggle-btn.rtl-toggle {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .toggle-btn.rtl-toggle:hover {
      background: var(--color-secondary);
      color: var(--color-primary);
      border-color: var(--color-primary);
    }

    @media (max-width: 576px) {
      .login-container {
        padding: 40px 20px;
        max-width: 100%;
      }

      .login-header .logo-text {
        font-size: 20px;
      }

      .remember-forgot {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
    }

    @media (max-width: 360px) {
      .login-container {
        padding: 30px 16px;
        border-radius: 8px;
        margin: 10px;
      }

      .login-header {
        margin-bottom: 30px;
      }

      .login-form h2 {
        font-size: 1.3rem;
        margin-bottom: 20px;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-group label {
        font-size: 0.85rem;
        margin-bottom: 6px;
      }

      .form-group input {
        padding: 10px 12px;
        font-size: 0.9rem;
      }

      .remember-forgot {
        font-size: 0.75rem;
        margin-bottom: 16px;
      }

      .login-btn {
        padding: 10px;
        font-size: 0.9rem;
        margin-bottom: 16px;
      }

      .divider {
        margin: 20px 0;
        font-size: 0.75rem;
      }

      .social-login {
        gap: 10px;
        margin-bottom: 20px;
      }

      .social-btn {
        padding: 10px;
        font-size: 0.8rem;
        gap: 8px;
      }

      .signup-link {
        font-size: 0.8rem;
      }

      .login-toggles {
        top: 10px;
        right: 10px;
        gap: 8px;
      }

      .toggle-btn {
        width: 36px;
        height: 36px;
        font-size: 0.8rem;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"] {
        font-size: 16px;
      }
    }
  </style>
</head>
<body class="login-page">
  <div class="login-toggles">
    <button class="toggle-btn" id="themeToggle" title="Toggle Dark/Light Mode">
      <i class="fa-solid fa-moon"></i>
    </button>
    <button class="toggle-btn rtl-toggle" id="rtlToggle" title="Toggle LTR/RTL">LTR</button>
  </div>

  <div class="login-container">
    <div class="login-header">
      <a href="index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <div style="width:44px;height:44px;background:var(--color-secondary);border-radius:10px;display:flex;align-items:center;justify-content:center;border:2px solid var(--color-primary);flex-shrink:0;">
          <i style="color:var(--color-primary);font-size:1.15rem;" class="fa-solid fa-dog"></i>
        </div>
        <span style="font-family:'DM Sans',sans-serif;font-size:1.2rem;font-weight:800;letter-spacing:3px;color:var(--color-text);white-space:nowrap;">PAWPRO</span>
      </a>
    </div>

    <form class="login-form" onsubmit="handleLogin(event)">
      <h2 style="text-align:center;margin-bottom:30px;font-size:24px;color:var(--color-text);">Welcome Back</h2>
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>
      </div>

      <div class="remember-forgot">
        <label style="display:flex;align-items:center;gap:6px;margin:0;font-weight:400;">
          <input type="checkbox" style="width:16px;height:16px;cursor:pointer;">
          Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="login-btn">Sign In</button>
    </form>

    <div class="divider">
      <span>OR</span>
    </div>

    <div class="social-login">
      <button type="button" class="social-btn" onclick="handleGoogleLogin()">
        <i class="fa-brands fa-google"></i>
        Continue with Google
      </button>
      <button type="button" class="social-btn" onclick="handleFacebookLogin()">
        <i class="fa-brands fa-facebook"></i>
        Continue with Facebook
      </button>
    </div>

    <div class="signup-link">
      Don't have an account? <a href="register.html">Sign Up</a>
    </div>
  </div>

  <script src="js/theme.js"></script>
  <script src="js/rtl.js"></script>
  <script>
    function handleLogin(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      console.log('Login attempt:', { email, password });
      alert('Login functionality would be connected to your backend.');
    }

    function handleGoogleLogin() {
      console.log('Google login clicked');
      alert('Google login would redirect to Google OAuth.');
    }

    function handleFacebookLogin() {
      console.log('Facebook login clicked');
      alert('Facebook login would redirect to Facebook OAuth.');
    }

    // Ensure toggles are initialized after page loads
    document.addEventListener('DOMContentLoaded', function() {
      if (window.initThemeToggle) window.initThemeToggle();
      if (window.initRtlToggle) window.initRtlToggle();
    });
  </script>
</body>
</html>

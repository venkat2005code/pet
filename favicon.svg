<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#0a0a0a" rx="20"/>
  
  <!-- Paw icon -->
  <g fill="#f97316">
    <!-- Center pad -->
    <circle cx="50" cy="70" r="12"/>
    
    <!-- Top left toe -->
    <circle cx="30" cy="35" r="8"/>
    
    <!-- Top center left toe -->
    <circle cx="42" cy="20" r="8"/>
    
    <!-- Top center right toe -->
    <circle cx="58" cy="20" r="8"/>
    
    <!-- Top right toe -->
    <circle cx="70" cy="35" r="8"/>
  </g>
</svg>
